services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Used for:
  #   • Session state (in-flight audio metadata, active session registry)
  #   • Conversation history cache (last N turns per user)
  #   • Pub/sub between server instances (future horizontal scaling)
  redis:
    image: redis:7-alpine
    container_name: langmate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis Commander ────────────────────────────────────────────────────────
  # Web UI to inspect Redis keys during development.
  # Access at: http://localhost:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: langmate_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  # ── MinIO ──────────────────────────────────────────────────────────────────
  # S3-compatible object storage for durable audio file persistence.
  # API:     http://localhost:9000
  # Console: http://localhost:9001  (minioadmin / minioadmin)
  minio:
    image: minio/minio:latest
    container_name: langmate_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
